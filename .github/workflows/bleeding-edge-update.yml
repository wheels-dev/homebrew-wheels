name: Auto-Update wheels-be Formula

on:
  schedule:
    - cron: '15 8 * * *'  # offset from auto-update.yml's :00 to avoid contention
  workflow_dispatch:
  # Fired by wheels-dev/wheels release workflow on every published release
  # (snapshot or final). Cuts the wait between an upstream release and a
  # bumped formula from up-to-24h (cron) down to ~5min. The event types are
  # static strings under our control — no untrusted input is interpolated.
  repository_dispatch:
    types:
      - wheels-released
      - lucli-released

permissions:
  contents: write
  pull-requests: write

# Serialize auto-update runs across all triggers (cron, workflow_dispatch,
# repository_dispatch). Without this, two repository_dispatch events
# arriving in quick succession — e.g., rapid-fire snapshot releases on
# wheels-dev/wheels (snapshot+1659 and +1660 published 39s apart on
# 2026-04-30) — produced two parallel workflows that each forked an
# auto-update branch off the same base. Once the first merged, the
# second's branch conflicted with master and stuck in DIRTY state.
#
# cancel-in-progress: false because we want each dispatch to actually
# bump the formula to that specific version, not skip versions when
# they pile up. The "Wait for checks and merge" step below holds the
# concurrency slot until the merge commits, so the next queued run
# forks off an already-bumped base.
concurrency:
  group: bleeding-edge-update-formula
  cancel-in-progress: false

jobs:
  check-updates:
    runs-on: macos-latest
    steps:
      # AUTO_MERGE_PAT (a fine-grained PAT scoped to this repo with
      # Contents: write + Pull requests: write) is used for git push, gh pr create,
      # and gh pr merge so the resulting push/pull_request events DO trigger
      # downstream workflows (the audit job). With the default GITHUB_TOKEN, those
      # events are suppressed by GitHub Actions' loop-prevention mechanism, leaving
      # auto-update PRs stuck in BLOCKED state with no required check ever firing.
      # Falls back to GITHUB_TOKEN if the PAT isn't set — auto-update still opens
      # PRs, they just won't auto-merge until manually nudged.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTO_MERGE_PAT || secrets.GITHUB_TOKEN }}

      - name: Check for updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_TYPE: ${{ github.event.action }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          DISPATCH_CHANNEL: ${{ github.event.client_payload.channel }}
        run: |
          set -euo pipefail

          # Channel filter — skip non-bleeding-edge dispatches. Stable releases
          # are handled by auto-update.yml in this repo, which writes
          # Formula/wheels.rb. This workflow only acts on bleeding-edge
          # snapshot publishes from wheels-dev/wheels-snapshots.
          #
          # Manual triggers (workflow_dispatch) and cron always proceed: they
          # check the snapshots repo for the latest pre-release.
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            CHANNEL="${DISPATCH_CHANNEL:-}"
            # Backwards compat: if channel field is empty, sniff version string.
            if [ -z "${CHANNEL}" ] && [ -n "${DISPATCH_VERSION:-}" ]; then
              if echo "${DISPATCH_VERSION}" | grep -qiE '\-snapshot[\.\+]'; then
                CHANNEL="bleeding-edge"
              else
                CHANNEL="stable"
              fi
            fi
            echo "Dispatch channel: ${CHANNEL:-stable (default)}"
            if [ "${CHANNEL}" != "bleeding-edge" ]; then
              echo "Skipping — channel '${CHANNEL}' is not bleeding-edge (handled by auto-update.yml)"
              echo "needs_update=false" >> "$GITHUB_OUTPUT"
              echo "current_lucli=skip" >> "$GITHUB_OUTPUT"
              echo "current_module=skip" >> "$GITHUB_OUTPUT"
              echo "latest_lucli=skip" >> "$GITHUB_OUTPUT"
              echo "latest_module=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Reject empty / literal "null" / whitespace-only version strings.
          # Any of those downstream produces a broken formula (see PR #3, cf9b215).
          validate_version() {
            local name="$1"
            local val="$2"
            if [ -z "${val// }" ] || [ "$val" = "null" ]; then
              echo "::error::$name resolved to an invalid value ('$val'). Aborting to avoid writing a broken formula." >&2
              exit 1
            fi
          }

          CURRENT_LUCLI=$(grep "LUCLI_VERSION" Formula/wheels-be.rb | head -1 | sed 's/.*"\(.*\)".*/\1/')
          CURRENT_MODULE=$(grep "MODULE_VERSION" Formula/wheels-be.rb | head -1 | sed 's/.*"\(.*\)".*/\1/')
          validate_version "CURRENT_LUCLI" "$CURRENT_LUCLI"
          validate_version "CURRENT_MODULE" "$CURRENT_MODULE"
          echo "current_lucli=$CURRENT_LUCLI" >> "$GITHUB_OUTPUT"
          echo "current_module=$CURRENT_MODULE" >> "$GITHUB_OUTPUT"

          LATEST_LUCLI=$(gh release view --repo cybersonic/LuCLI --json tagName -q '.tagName' | sed 's/^v//')
          validate_version "LATEST_LUCLI" "$LATEST_LUCLI"
          echo "latest_lucli=$LATEST_LUCLI" >> "$GITHUB_OUTPUT"

          # Module version resolution.
          #
          # When triggered via repository_dispatch[wheels-released], trust the
          # client_payload.version sent by wheels-dev/wheels' release.yml — it
          # already knows exactly which version was just published. Querying
          # the API in that window hits an eventual-consistency race where
          # the release exists but the wheels-module-*.tar.gz asset hasn't
          # finished uploading; the asset filter then returns empty and the
          # strict guard above aborts. Auto-update was stuck for hours on
          # April 27 for exactly this reason — every dispatched run failed
          # validation while the cron picked up the previous tick fine.
          #
          # For schedule / workflow_dispatch / lucli-released triggers, fall
          # back to the API query but wrap it in retry-with-backoff so a
          # cron that happens to fire during the same upload window self-heals
          # instead of needing the next tick. DISPATCH_TYPE / DISPATCH_VERSION
          # come from env (see step env block) so they're safely quoted as
          # bash variables, not interpolated into the script body.
          LATEST_MODULE=""
          if [ "${DISPATCH_TYPE:-}" = "wheels-released" ] \
              && [ -n "${DISPATCH_VERSION:-}" ] \
              && [ "${DISPATCH_VERSION:-}" != "null" ]; then
            LATEST_MODULE="${DISPATCH_VERSION#v}"
            echo "Using dispatch payload for module version: $LATEST_MODULE"
          fi

          if [ -z "${LATEST_MODULE:-}" ]; then
            for attempt in 1 2 3 4 5; do
              LATEST_MODULE=$(gh api "repos/wheels-dev/wheels/releases?per_page=100" -q '
                [.[] | select(.draft == false) | select(any(.assets[]; .name | test("wheels-module.*\\.tar\\.gz")))] | .[0].tag_name // ""
              ' | sed 's/^v//')
              if [ -n "${LATEST_MODULE// }" ] && [ "$LATEST_MODULE" != "null" ]; then
                break
              fi
              backoff=$((attempt * 15))
              echo "Attempt ${attempt}/5: API returned no release with wheels-module-*.tar.gz asset; retrying in ${backoff}s..."
              sleep "$backoff"
            done
          fi
          validate_version "LATEST_MODULE" "$LATEST_MODULE"
          echo "latest_module=$LATEST_MODULE" >> "$GITHUB_OUTPUT"

          NEEDS_UPDATE="false"
          if [ "$CURRENT_LUCLI" != "$LATEST_LUCLI" ]; then
            NEEDS_UPDATE="true"
            echo "LuCLI update: $CURRENT_LUCLI -> $LATEST_LUCLI"
          fi
          if [ "$CURRENT_MODULE" != "$LATEST_MODULE" ]; then
            NEEDS_UPDATE="true"
            echo "Module update: $CURRENT_MODULE -> $LATEST_MODULE"
          fi
          echo "needs_update=$NEEDS_UPDATE" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 hashes
        if: steps.check.outputs.needs_update == 'true'
        id: hashes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LUCLI_VER: ${{ steps.check.outputs.latest_lucli }}
          MODULE_VER: ${{ steps.check.outputs.latest_module }}
        run: |
          set -euo pipefail

          require_sha() {
            local name="$1"
            local val="$2"
            if [ -z "$val" ] || [ "${#val}" -ne 64 ]; then
              echo "::error::$name did not compute a valid sha256 ('$val')." >&2
              exit 1
            fi
          }

          curl -sfL "https://github.com/cybersonic/LuCLI/releases/download/v${LUCLI_VER}/lucli-${LUCLI_VER}-macos" -o /tmp/lucli-macos
          MACOS_SHA=$(shasum -a 256 /tmp/lucli-macos | awk '{print $1}')
          require_sha "MACOS_SHA" "$MACOS_SHA"
          echo "macos_sha=$MACOS_SHA" >> "$GITHUB_OUTPUT"

          curl -sfL "https://github.com/cybersonic/LuCLI/releases/download/v${LUCLI_VER}/lucli-${LUCLI_VER}-linux" -o /tmp/lucli-linux
          LINUX_SHA=$(shasum -a 256 /tmp/lucli-linux | awk '{print $1}')
          require_sha "LINUX_SHA" "$LINUX_SHA"
          echo "linux_sha=$LINUX_SHA" >> "$GITHUB_OUTPUT"

          # Module tarball is required now that MODULE_VERSION validation is strict —
          # fail the workflow if the advertised release doesn't actually have the asset.
          curl -sfL "https://github.com/wheels-dev/wheels-snapshots/releases/download/v${MODULE_VER}/wheels-module-${MODULE_VER}.tar.gz" -o /tmp/wheels-module.tar.gz
          MODULE_SHA=$(shasum -a 256 /tmp/wheels-module.tar.gz | awk '{print $1}')
          require_sha "MODULE_SHA" "$MODULE_SHA"
          echo "module_sha=$MODULE_SHA" >> "$GITHUB_OUTPUT"

          # Framework-source zip — required so `wheels new` can boot the scaffold.
          # See wheels-dev/wheels PR 2294 for the release-workflow fix that
          # started publishing this artifact on snapshots.
          curl -sfL "https://github.com/wheels-dev/wheels-snapshots/releases/download/v${MODULE_VER}/wheels-core-${MODULE_VER}.zip" -o /tmp/wheels-core.zip
          CORE_SHA=$(shasum -a 256 /tmp/wheels-core.zip | awk '{print $1}')
          require_sha "CORE_SHA" "$CORE_SHA"
          echo "core_sha=$CORE_SHA" >> "$GITHUB_OUTPUT"

      - name: Update formula
        if: steps.check.outputs.needs_update == 'true'
        env:
          LUCLI_VER: ${{ steps.check.outputs.latest_lucli }}
          MODULE_VER: ${{ steps.check.outputs.latest_module }}
          MACOS_SHA: ${{ steps.hashes.outputs.macos_sha }}
          LINUX_SHA: ${{ steps.hashes.outputs.linux_sha }}
          MODULE_SHA: ${{ steps.hashes.outputs.module_sha }}
          CORE_SHA: ${{ steps.hashes.outputs.core_sha }}
        run: |
          set -euo pipefail

          # Belt-and-suspenders: reject empty inputs here too, in case upstream steps
          # are edited in the future and the earlier guards get weakened.
          for var in LUCLI_VER MODULE_VER MACOS_SHA LINUX_SHA MODULE_SHA CORE_SHA; do
            val="${!var}"
            if [ -z "${val// }" ] || [ "$val" = "null" ]; then
              echo "::error::$var is empty or null; refusing to write formula." >&2
              exit 1
            fi
          done

          sed -i '' "s/LUCLI_VERSION = \".*\"/LUCLI_VERSION = \"${LUCLI_VER}\"/" Formula/wheels-be.rb
          sed -i '' "s/MODULE_VERSION = \".*\"/MODULE_VERSION = \"${MODULE_VER}\"/" Formula/wheels-be.rb

          python3 << 'PYEOF'
          import re, os
          macos_sha = os.environ["MACOS_SHA"]
          linux_sha = os.environ["LINUX_SHA"]
          module_sha = os.environ["MODULE_SHA"]
          core_sha = os.environ["CORE_SHA"]

          with open("Formula/wheels-be.rb", "r") as f:
              content = f.read()

          # Update each sha256 by anchoring on context unique to its target,
          # rather than by position in the file. This is robust to formula
          # reordering and avoids the silent bug where only the LuCLI shas
          # were rotating while the module/core shas drifted out of sync.
          # The wheels_core block uses [^"]+ instead of [a-fA-F0-9]+ so the
          # initial PLACEHOLDER_CORE_SHA sentinel also matches on first run.
          replacements = [
              (r'(-macos"\s*\n\s*sha256 ")[a-fA-F0-9]+(")', macos_sha),
              (r'(-linux"\s*\n\s*sha256 ")[a-fA-F0-9]+(")', linux_sha),
              (r'(resource "wheels_module" do\s*\n\s*url "[^"]+"\s*\n\s*sha256 ")[a-fA-F0-9]+(")', module_sha),
              (r'(resource "wheels_core" do\s*\n\s*url "[^"]+"\s*\n\s*sha256 ")[^"]+(")', core_sha),
          ]
          for pattern, new_sha in replacements:
              new_content, n = re.subn(pattern, lambda m, s=new_sha: m.group(1) + s + m.group(2), content)
              if n != 1:
                  raise SystemExit(f"::error::Expected exactly 1 match for sha256 pattern, got {n}: {pattern}")
              content = new_content

          with open("Formula/wheels-be.rb", "w") as f:
              f.write(content)
          PYEOF

      - name: Verify formula integrity
        if: steps.check.outputs.needs_update == 'true'
        run: |
          set -euo pipefail

          # Post-write verification: re-read the formula and confirm no constant is empty.
          # This catches regressions in the sed/python rewrite logic.
          WROTE_LUCLI=$(grep "LUCLI_VERSION" Formula/wheels-be.rb | head -1 | sed 's/.*"\(.*\)".*/\1/')
          WROTE_MODULE=$(grep "MODULE_VERSION" Formula/wheels-be.rb | head -1 | sed 's/.*"\(.*\)".*/\1/')

          if [ -z "${WROTE_LUCLI// }" ] || [ "$WROTE_LUCLI" = "null" ]; then
            echo "::error::Formula/wheels-be.rb has empty or invalid LUCLI_VERSION after rewrite: '$WROTE_LUCLI'" >&2
            exit 1
          fi
          if [ -z "${WROTE_MODULE// }" ] || [ "$WROTE_MODULE" = "null" ]; then
            echo "::error::Formula/wheels-be.rb has empty or invalid MODULE_VERSION after rewrite: '$WROTE_MODULE'" >&2
            exit 1
          fi

          # Reject any URL that would resolve to a 404 because of empty interpolation.
          # Example failure: "v/wheels-module-.tar.gz" (what broke in cf9b215).
          if grep -E 'releases/download/v/|/wheels-module-\.tar\.gz|/lucli--(macos|linux)' Formula/wheels-be.rb; then
            echo "::error::Formula contains a malformed URL suggestive of empty version interpolation." >&2
            exit 1
          fi

          echo "Formula verified: LUCLI_VERSION=$WROTE_LUCLI, MODULE_VERSION=$WROTE_MODULE"

      - name: Smoke test formula (brew audit + fetch)
        if: steps.check.outputs.needs_update == 'true'
        run: |
          set -euo pipefail

          # Tap locally so `brew audit` / `brew fetch` can resolve the formula.
          TAP_DIR="$(brew --repository)/Library/Taps/wheels-dev/homebrew-wheels"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -sfn "$GITHUB_WORKSPACE" "$TAP_DIR"

          # Strict audit catches syntax errors, malformed URLs, missing SHAs, etc.
          brew audit --strict wheels-dev/wheels/wheels-be

          # `brew fetch` resolves and downloads the main URL + all resources
          # without running the install. This catches 404s on the module tarball
          # URL — exactly the failure mode of cf9b215 — before we ever open a PR.
          brew fetch --retry wheels-dev/wheels/wheels-be

      - name: Create PR
        if: steps.check.outputs.needs_update == 'true'
        env:
          # Use the PAT (when set) so the resulting `push origin <branch>` and
          # the PR creation event DO trigger the on:pull_request audit workflow.
          # See checkout step at top of job for full rationale.
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT || secrets.GITHUB_TOKEN }}
          LUCLI_VER: ${{ steps.check.outputs.latest_lucli }}
          MODULE_VER: ${{ steps.check.outputs.latest_module }}
          CURRENT_LUCLI: ${{ steps.check.outputs.current_lucli }}
          CURRENT_MODULE: ${{ steps.check.outputs.current_module }}
        run: |
          set -euo pipefail

          # Sanitize version strings for branch names (+ is legal but noisy in refs).
          sanitize() { echo "$1" | tr '+' '-'; }
          BRANCH="auto-update/wheels-be-lucli-$(sanitize "$LUCLI_VER")-module-$(sanitize "$MODULE_VER")"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Formula/wheels-be.rb
          git commit -m "chore: update wheels-be to LuCLI ${LUCLI_VER}, module ${MODULE_VER}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: update wheels-be to LuCLI ${LUCLI_VER}, module ${MODULE_VER}" \
            --body "Auto-update from upstream releases.

          - LuCLI: ${CURRENT_LUCLI} -> ${LUCLI_VER}
          - Module: ${CURRENT_MODULE} -> ${MODULE_VER}" \
            --label "auto-update"

      # Synchronous wait-and-merge. Replaces a previous `gh pr merge --auto
      # --squash` invocation that scheduled the merge for after-checks-pass
      # and exited immediately — that pattern released the workflow's
      # concurrency lock before the merge actually committed, allowing the
      # next queued auto-update run to fork off a stale base. Holding the
      # slot through the merge means each subsequent run sees an
      # already-bumped master and produces a clean PR with no conflicts.
      #
      # Polls the PR's mergeStateStatus. CLEAN → squash-merge. BLOCKED or
      # UNSTABLE → required check still pending or transient instability,
      # keep waiting. DIRTY → unexpected (concurrency group should prevent
      # it); fail loudly so the issue is visible. BEHIND → upstream moved;
      # update the branch.
      #
      # Caps total wait at 10 min so a stuck check can't block the queue
      # forever; the audit job normally completes in ~60s.
      - name: Wait for checks and merge
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT || secrets.GITHUB_TOKEN }}
          LUCLI_VER: ${{ steps.check.outputs.latest_lucli }}
          MODULE_VER: ${{ steps.check.outputs.latest_module }}
        run: |
          set -euo pipefail

          sanitize() { echo "$1" | tr '+' '-'; }
          BRANCH="auto-update/wheels-be-lucli-$(sanitize "$LUCLI_VER")-module-$(sanitize "$MODULE_VER")"

          PR_NUMBER=$(gh pr list --head "$BRANCH" --json number -q '.[0].number // ""')
          if [ -z "$PR_NUMBER" ]; then
            echo "::warning::No open PR found for branch $BRANCH; nothing to merge."
            exit 0
          fi

          MAX_WAIT=600
          INTERVAL=15
          ELAPSED=0
          STATE=""
          while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
            STATE=$(gh pr view "$PR_NUMBER" --json mergeStateStatus -q '.mergeStateStatus')
            case "$STATE" in
              CLEAN)
                echo "PR #$PR_NUMBER is mergeable. Squash-merging..."
                gh pr merge "$PR_NUMBER" --squash --delete-branch
                echo "PR #$PR_NUMBER merged."
                exit 0
                ;;
              BLOCKED|UNSTABLE)
                echo "Waiting (${ELAPSED}s elapsed): mergeStateStatus=$STATE"
                ;;
              DIRTY)
                echo "::error::PR #$PR_NUMBER has conflicts (DIRTY). The serialization concurrency group should have prevented this — investigate."
                exit 1
                ;;
              BEHIND)
                echo "PR #$PR_NUMBER is BEHIND base; updating branch..."
                gh pr update-branch "$PR_NUMBER" --rebase || gh pr update-branch "$PR_NUMBER" || true
                ;;
              *)
                echo "Unexpected mergeStateStatus: $STATE — continuing to wait"
                ;;
            esac
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::error::Timed out after ${MAX_WAIT}s waiting for PR #$PR_NUMBER. Last state: $STATE"
          exit 1
