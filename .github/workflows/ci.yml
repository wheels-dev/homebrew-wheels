name: CI

on:
  pull_request:

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tap this repo
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/wheels-dev"
          ln -s "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/wheels-dev/homebrew-wheels"

      - name: Audit formula
        run: brew audit --strict wheels

      - name: Install formula
        run: brew install wheels

      - name: Test formula
        run: brew test wheels
